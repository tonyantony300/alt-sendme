name: 'publish'

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: '--bundles nsis,msi'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install NSIS (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: choco install nsis -y

      - name: Add NSIS to PATH
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $env:Path = "C:\Program Files (x86)\NSIS;" + $env:Path
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: cd web-app && npm install

      - name: Extract version from tag and sync
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cd src-tauri
          npm pkg set version="$VERSION"
          npm run sync-version
          node ../scripts/validate-version.js
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: import certificate (macOS only)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "Apple certificate secrets not set, skipping certificate import"
            exit 0
          fi
          
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          
          echo -n "$APPLE_CERTIFICATE" | base64 --decode > $CERTIFICATE_PATH
          
          security create-keychain -p "$APPLE_CERTIFICATE_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$APPLE_CERTIFICATE_PASSWORD" $KEYCHAIN_PATH
          
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH $(security list-keychains | sed 's/["]//g')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$APPLE_CERTIFICATE_PASSWORD" $KEYCHAIN_PATH
          
          echo "Certificate imported successfully"

      - name: Validate notarization requirements (macOS only)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          if [ -z "${{ secrets.APPLE_ID }}" ] || [ -z "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" ] || [ -z "${{ secrets.APPLE_TEAM_ID }}" ]; then
            echo "ERROR: Missing required notarization secrets"
            echo "Required: APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID"
            exit 1
          fi
          echo "All notarization secrets present"

      - name: Generate release notes from commits
        id: release_notes
        shell: bash
        run: |
          git fetch --tags --force --prune origin
          
          CURRENT_TAG="${{ github.ref_name }}"
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -n 1)
          
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found, showing all commits"
            COMMIT_RANGE="HEAD"
          else
            echo "Comparing ${PREVIOUS_TAG}...${CURRENT_TAG}"
            COMMIT_RANGE="${PREVIOUS_TAG}..HEAD"
          fi
          
          CHANGELOG=$(git log ${COMMIT_RANGE} --pretty=format:"- %s (%h)" --no-merges | head -50)
          
          {
            echo "## What's Changed"
            echo ""
            if [ -z "$CHANGELOG" ]; then
              echo "- Initial release"
            else
              echo "$CHANGELOG"
            fi
            echo ""
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
            fi
            echo ""
            echo "---"
            echo ""
            echo "See the assets below to download and install this version."
          } > release_notes.txt
          
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Tony Antony (9H7RVQAP36)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        with:
          projectPath: ./src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'AltSendme ${{ env.VERSION }}'
          args: ${{ matrix.args }}
          releaseBody: ${{ steps.release_notes.outputs.notes }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true

  generate-latest-json:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install jq
        uses: dcarbone/install-jq-action@v2.0.1
      
      - name: Get release assets and generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.%3NZ")
          
          # Wait for release to be created with retry logic
          MAX_RETRIES=10
          RETRY_COUNT=0
          RELEASE_ID=""
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RELEASE_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG_NAME" | \
              jq -r '.id')
            
            if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
              echo "Release found with ID: $RELEASE_ID"
              break
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Waiting for release to be created... (attempt $RETRY_COUNT/$MAX_RETRIES)"
            sleep 5
          done
          
          if [ "$RELEASE_ID" == "null" ] || [ -z "$RELEASE_ID" ]; then
            echo "ERROR: Could not find release for tag $TAG_NAME after $MAX_RETRIES attempts"
            echo "Available releases:"
            curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases" | \
              jq -r '.[] | "\(.tag_name) - \(.draft // false)"'
            exit 1
          fi
          
          # Wait for assets to be uploaded
          ASSET_RETRY_COUNT=0
          ASSET_MAX_RETRIES=20
          ASSETS="[]"
          
          while [ $ASSET_RETRY_COUNT -lt $ASSET_MAX_RETRIES ]; do
            ASSETS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets")
            
            ASSET_COUNT=$(echo "$ASSETS" | jq '. | length')
            if [ "$ASSET_COUNT" -gt 0 ]; then
              echo "Found $ASSET_COUNT assets"
              break
            fi
            
            ASSET_RETRY_COUNT=$((ASSET_RETRY_COUNT + 1))
            echo "Waiting for assets to be uploaded... (attempt $ASSET_RETRY_COUNT/$ASSET_MAX_RETRIES)"
            sleep 10
          done
          
          echo "Available assets:"
          echo "$ASSETS" | jq -r '.[] | .name'
          
          # Try multiple patterns for macOS
          MACOS_APP=$(echo "$ASSETS" | jq -r '.[] | select(.name | test("\\.app\\.tar\\.gz$|universal.*\\.app\\.tar\\.gz$")) | .name' | head -1)
          MACOS_SIG=$(echo "$ASSETS" | jq -r '.[] | select(.name | test("\\.app\\.tar\\.gz\\.sig$|universal.*\\.app\\.tar\\.gz\\.sig$")) | .name' | head -1)
          
          # Try multiple patterns for Windows
          WINDOWS_EXE=$(echo "$ASSETS" | jq -r '.[] | select(.name | test("\\.nsis\\.zip$|\\.exe$")) | .name' | head -1)
          WINDOWS_SIG=$(echo "$ASSETS" | jq -r '.[] | select(.name | test("\\.nsis\\.zip\\.sig$|\\.exe\\.sig$")) | .name' | head -1)
          
          # Try multiple patterns for Linux
          LINUX_APPIMAGE=$(echo "$ASSETS" | jq -r '.[] | select(.name | test("\\.AppImage\\.tar\\.gz$|\\.AppImage$")) | .name' | head -1)
          LINUX_SIG=$(echo "$ASSETS" | jq -r '.[] | select(.name | test("\\.AppImage\\.tar\\.gz\\.sig$|\\.AppImage\\.sig$")) | .name' | head -1)
          
          echo "Found assets:"
          echo "  macOS: $MACOS_APP (sig: $MACOS_SIG)"
          echo "  windows: $WINDOWS_EXE (sig: $WINDOWS_SIG)"
          echo "  linux: $LINUX_APPIMAGE (sig: $LINUX_SIG)"
          
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/$TAG_NAME"
          
          if [ -n "$MACOS_SIG" ]; then
            curl -sL -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/assets/$(echo "$ASSETS" | jq -r ".[] | select(.name == \"$MACOS_SIG\") | .id")" \
              -H "Accept: application/octet-stream" > /tmp/macos.sig
            MACOS_SIGNATURE=$(cat /tmp/macos.sig | tr -d '\n')
          else
            MACOS_SIGNATURE=""
          fi
          
          if [ -n "$WINDOWS_SIG" ]; then
            curl -sL -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/assets/$(echo "$ASSETS" | jq -r ".[] | select(.name == \"$WINDOWS_SIG\") | .id")" \
              -H "Accept: application/octet-stream" > /tmp/windows.sig
            WINDOWS_SIGNATURE=$(cat /tmp/windows.sig | tr -d '\n')
          else
            WINDOWS_SIGNATURE=""
          fi
          
          if [ -n "$LINUX_SIG" ]; then
            curl -sL -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/assets/$(echo "$ASSETS" | jq -r ".[] | select(.name == \"$LINUX_SIG\") | .id")" \
              -H "Accept: application/octet-stream" > /tmp/linux.sig
            LINUX_SIGNATURE=$(cat /tmp/linux.sig | tr -d '\n')
          else
            LINUX_SIGNATURE=""
          fi
          
          MACOS_URL="$BASE_URL/$MACOS_APP"
          WINDOWS_URL="$BASE_URL/$WINDOWS_EXE"
          LINUX_URL="$BASE_URL/$LINUX_APPIMAGE"
          
          jq --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg linux_signature "$LINUX_SIGNATURE" \
            --arg linux_url "$LINUX_URL" \
            --arg windows_signature "$WINDOWS_SIGNATURE" \
            --arg windows_url "$WINDOWS_URL" \
            --arg darwin_arm_signature "$MACOS_SIGNATURE" \
            --arg darwin_arm_url "$MACOS_URL" \
            --arg darwin_amd_signature "$MACOS_SIGNATURE" \
            --arg darwin_amd_url "$MACOS_URL" \
            '.version = $version
              | .pub_date = $pub_date
              | .platforms["linux-x86_64"].signature = $linux_signature
              | .platforms["linux-x86_64"].url = $linux_url
              | .platforms["windows-x86_64"].signature = $windows_signature
              | .platforms["windows-x86_64"].url = $windows_url
              | .platforms["darwin-aarch64"].signature = $darwin_arm_signature
              | .platforms["darwin-aarch64"].url = $darwin_arm_url
              | .platforms["darwin-x86_64"].signature = $darwin_amd_signature
              | .platforms["darwin-x86_64"].url = $darwin_amd_url' \
            src-tauri/latest.json.template > latest.json
          
          cat latest.json
      
      - name: Get release upload URL
        id: get_upload_url
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          UPLOAD_URL=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG_NAME" | \
            jq -r '.upload_url' | sed 's/{?name,label}//')
          
          if [ "$UPLOAD_URL" == "null" ] || [ -z "$UPLOAD_URL" ]; then
            echo "ERROR: Could not get upload URL for release"
            exit 1
          fi
          
          echo "upload_url=$UPLOAD_URL" >> $GITHUB_OUTPUT
      
      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: actions/upload-release-asset@v1.0.1
        with:
          upload_url: ${{ steps.get_upload_url.outputs.upload_url }}
          asset_path: ./latest.json
          asset_name: latest.json
          asset_content_type: application/json